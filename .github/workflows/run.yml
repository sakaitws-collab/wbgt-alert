name: WBGT Alert

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Pythonセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: ライブラリインストール
      run: |
        pip install requests beautifulsoup4

    - name: 実行
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}   # ✅ これが超重要
      run: |
        python wbgt.py
